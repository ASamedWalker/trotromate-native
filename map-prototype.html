<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Troski — Live Transit Map</title>
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', system-ui, sans-serif; background: #0c0a09; color: #fafaf9; overflow: hidden; }
    #map { width: 100vw; height: 100vh; }

    /* ── Top search bar ── */
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20;
      padding: 12px 16px 8px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(to bottom, rgba(12,10,9,0.7) 0%, transparent 100%);
      pointer-events: none;
    }
    .top-bar > * { pointer-events: auto; }
    .search-bar {
      flex: 1; max-width: 420px;
      background: rgba(28,25,23,0.92); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,173,58,0.12); border-radius: 14px;
      padding: 12px 16px; display: flex; align-items: center; gap: 10px;
      cursor: pointer; transition: border-color 0.2s;
    }
    .search-bar:hover { border-color: rgba(255,173,58,0.3); }
    .search-placeholder { color: #78716c; font-size: 14px; font-weight: 500; }

    /* ── Live badge ── */
    .live-badge {
      position: fixed; top: 66px; left: 16px; z-index: 10;
      background: rgba(12,10,9,0.88); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,173,58,0.15); border-radius: 12px;
      padding: 8px 14px; display: flex; align-items: center; gap: 8px;
    }
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #22c55e;
      animation: pulse-dot 2s ease-in-out infinite;
      box-shadow: 0 0 6px rgba(34,197,94,0.5);
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.4); }
    }
    .live-badge span { font-size: 12px; font-weight: 600; }
    .live-count { color: #FFAD3A; font-weight: 800; }

    /* ── Bottom action bar ── */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
      background: rgba(12,10,9,0.94); backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 12px 16px 24px;
      display: flex; align-items: center; gap: 12px;
    }
    .wallet-card {
      flex: 1; background: rgba(28,25,23,0.95);
      border: 1px solid rgba(255,173,58,0.12); border-radius: 14px;
      padding: 12px 16px; display: flex; align-items: center; gap: 12px;
      cursor: pointer; transition: border-color 0.2s;
    }
    .wallet-card:hover { border-color: rgba(255,173,58,0.3); }
    .wallet-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: rgba(34,197,94,0.12); display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .wallet-info { flex: 1; }
    .wallet-label { font-size: 10px; color: #78716c; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
    .wallet-balance { font-size: 20px; font-weight: 800; color: #fafaf9; margin-top: 1px; }
    .wallet-balance span { color: #57534e; font-size: 14px; font-weight: 500; }
    .scan-btn {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, #FF716A, #FFAD3A);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: transform 0.15s; box-shadow: 0 4px 20px rgba(255,173,58,0.35);
      font-size: 22px; border: none;
    }
    .scan-btn:hover { transform: scale(1.05); }
    .scan-btn:active { transform: scale(0.95); }

    /* ── Context pills ── */
    .float-pills {
      position: fixed; top: 66px; right: 16px; z-index: 10;
      display: flex; flex-direction: column; gap: 6px;
    }
    .float-pill {
      background: rgba(12,10,9,0.85); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.06); border-radius: 10px;
      padding: 6px 12px; font-size: 11px; font-weight: 600; color: #a8a29e;
      display: flex; align-items: center; gap: 6px;
    }
    .pill-dot { width: 6px; height: 6px; border-radius: 3px; }

    /* ── Vehicle popup ── */
    .mapboxgl-popup { max-width: none !important; }
    .mapboxgl-popup-content {
      background: rgba(28,25,23,0.96) !important; color: #fafaf9 !important;
      border-radius: 16px !important; padding: 0 !important;
      border: 1px solid rgba(255,173,58,0.12) !important;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6) !important;
      backdrop-filter: blur(20px) !important; min-width: 260px;
      overflow: hidden;
    }
    .mapboxgl-popup-close-button { color: #57534e !important; font-size: 20px !important; padding: 8px 12px !important; }
    .mapboxgl-popup-close-button:hover { color: #fafaf9 !important; }
    .mapboxgl-popup-tip { border-top-color: rgba(28,25,23,0.96) !important; }
    .popup-header {
      padding: 16px 16px 12px; display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .popup-avatar {
      width: 44px; height: 44px; border-radius: 22px;
      background: linear-gradient(135deg, #FFAD3A, #FF716A);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 15px; color: #1c1917;
      flex-shrink: 0;
    }
    .popup-name { font-size: 16px; font-weight: 700; color: #fafaf9; }
    .popup-route { font-size: 12px; color: #78716c; margin-top: 2px; font-weight: 500; }
    .popup-stats {
      padding: 14px 16px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
    }
    .popup-stat { text-align: center; }
    .popup-stat-label { font-size: 9px; color: #57534e; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
    .popup-stat-value { font-size: 18px; font-weight: 800; color: #fafaf9; margin-top: 2px; }
    .popup-stat-value.amber { color: #FFAD3A; }
    .popup-stat-value.green { color: #22c55e; }
    .popup-actions {
      padding: 0 12px 12px; display: flex; gap: 8px;
    }
    .popup-cta {
      flex: 1; padding: 11px; border-radius: 12px; text-align: center;
      background: linear-gradient(135deg, #FF716A, #FFAD3A);
      color: #1c1917; font-weight: 700; font-size: 13px; cursor: pointer;
      transition: transform 0.15s;
    }
    .popup-cta:hover { transform: scale(1.02); }
    .popup-track {
      padding: 11px 16px; border-radius: 12px; text-align: center;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
      color: #a8a29e; font-weight: 600; font-size: 13px; cursor: pointer;
      transition: all 0.15s;
    }
    .popup-track:hover { background: rgba(255,255,255,0.1); color: #fafaf9; }

    /* ── Station popup ── */
    .station-popup .popup-header { border-bottom: 1px solid rgba(96,165,250,0.1); }
    .station-avatar {
      width: 44px; height: 44px; border-radius: 22px;
      background: rgba(96,165,250,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .station-name { font-size: 16px; font-weight: 700; color: #fafaf9; }
    .station-type { font-size: 12px; color: #60a5fa; margin-top: 2px; font-weight: 600; }

    /* ── Refresh indicator ── */
    .refresh-indicator {
      position: fixed; bottom: 100px; right: 16px; z-index: 10;
      background: rgba(28,25,23,0.9); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.06); border-radius: 10px;
      padding: 8px 12px; font-size: 11px; color: #57534e; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
    }
    .refresh-indicator:hover { color: #FFAD3A; border-color: rgba(255,173,58,0.2); }

    /* ── Locate me button ── */
    .locate-btn {
      position: fixed; bottom: 100px; left: 16px; z-index: 10;
      width: 44px; height: 44px; border-radius: 12px;
      background: rgba(28,25,23,0.9); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 18px; transition: all 0.2s;
    }
    .locate-btn:hover { border-color: rgba(96,165,250,0.3); }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="search-bar">
      <span style="color:#FFAD3A">🔍</span>
      <span class="search-placeholder">Where are you going?</span>
    </div>
  </div>

  <div class="live-badge">
    <div class="live-dot"></div>
    <span><span class="live-count" id="count">0</span> trotros live</span>
  </div>

  <div class="float-pills" id="pills"></div>
  <div id="map"></div>

  <div class="locate-btn" onclick="locateMe()" title="My Location">📍</div>
  <div class="refresh-indicator" id="status" onclick="fetchPositions()">Loading...</div>

  <div class="bottom-bar">
    <div class="wallet-card">
      <div class="wallet-icon">💳</div>
      <div class="wallet-info">
        <div class="wallet-label">Wallet</div>
        <div class="wallet-balance">GH₵ 45<span>.00</span></div>
      </div>
    </div>
    <button class="scan-btn" title="Scan QR to Pay">📷</button>
  </div>

  <script>
    // ── Config ──
    mapboxgl.accessToken = 'pk.eyJ1Ijoic2FtcHkxIiwiYSI6ImNranl2NHNjdTAxZzQzMWxldmx5dGhkaDEifQ.1eOzL1554nbXGIPai5Kmlg';
    const SUPABASE_URL = 'https://rqctajmbfrqtjuwkykrg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJxY3Rham1iZnJxdGp1d2t5a3JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1Mzk5ODcsImV4cCI6MjA4NTExNTk4N30.jaPQiSS9ltsupXB2yMEnEkKyCxjOJUC5AP1KPl7kY68';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let driverMap = {};
    let userMarker = null;

    const ROUTE_DESTINATIONS = {
      'Circle → Madina': { lat: 5.6697, lng: -0.1662, name: 'Madina' },
      'Kasoa → Kaneshie': { lat: 5.5508, lng: -0.2377, name: 'Kaneshie' },
      'Madina → Accra': { lat: 5.5502, lng: -0.2174, name: 'Accra Central' },
      'Achimota → Circle': { lat: 5.5702, lng: -0.2167, name: 'Circle' },
      'Tema → Accra': { lat: 5.5502, lng: -0.2174, name: 'Accra Central' },
      'Lapaz → Circle': { lat: 5.5702, lng: -0.2167, name: 'Circle' },
      'Nima → Circle': { lat: 5.5702, lng: -0.2167, name: 'Circle' },
      'Adenta → Madina': { lat: 5.6697, lng: -0.1662, name: 'Madina' },
      'Dansoman → Kaneshie': { lat: 5.5508, lng: -0.2377, name: 'Kaneshie' },
      'Osu → Circle': { lat: 5.5702, lng: -0.2167, name: 'Circle' },
    };

    // ── Map ──
    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/dark-v11',
      center: [-0.2050, 5.5750],
      zoom: 12, pitch: 0, bearing: 0,
      antialias: true,
      attributionControl: false,
    });
    map.addControl(new mapboxgl.AttributionControl({ compact: true }), 'bottom-left');

    // ── Cinematic intro ──
    setTimeout(() => {
      map.easeTo({ pitch: 50, bearing: -20, zoom: 12.8, duration: 3500, easing: t => 1 - Math.pow(1-t, 3) });
    }, 600);

    // ── Custom map styling at runtime — mute roads, warm buildings ──
    map.on('style.load', () => {
      // Mute road colors
      try {
        map.setPaintProperty('road-primary', 'line-color', '#292524');
        map.setPaintProperty('road-secondary-tertiary', 'line-color', '#1c1917');
        map.setPaintProperty('road-street', 'line-color', '#1c1917');
        map.setPaintProperty('road-motorway-trunk', 'line-color', '#44403c');
      } catch(e) {}

      // Warm water color
      try {
        map.setPaintProperty('water', 'fill-color', '#0c0a09');
      } catch(e) {}

      // Mute labels
      try {
        map.setPaintProperty('road-label', 'text-color', '#57534e');
        map.setPaintProperty('natural-point-label', 'text-color', '#44403c');
      } catch(e) {}
    });

    map.on('load', () => {
      // ── 3D Buildings — warm stone tones ──
      const layers = map.getStyle().layers;
      const labelLayerId = layers.find(l => l.type === 'symbol' && l.layout && l.layout['text-field'])?.id;

      map.addLayer({
        id: '3d-buildings',
        source: 'composite',
        'source-layer': 'building',
        filter: ['==', 'extrude', 'true'],
        type: 'fill-extrusion',
        minzoom: 14,
        paint: {
          'fill-extrusion-color': ['interpolate', ['linear'], ['get', 'height'],
            0, '#1c1917', 30, '#292524', 60, '#3a3632', 100, '#44403c'
          ],
          'fill-extrusion-height': ['interpolate', ['linear'], ['zoom'], 14, 0, 14.05, ['get', 'height']],
          'fill-extrusion-base': ['interpolate', ['linear'], ['zoom'], 14, 0, 14.05, ['get', 'min_height']],
          'fill-extrusion-opacity': 0.7,
          'fill-extrusion-vertical-gradient': true,
        },
      }, labelLayerId);

      // ── Transport stops (2,584 OSM stops — bus, trotro, lorry park, taxi, train) ──
      map.addSource('transport-stops', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });

      map.addLayer({
        id: 'transport-stops-dots', type: 'circle', source: 'transport-stops', minzoom: 13,
        paint: {
          'circle-radius': ['interpolate', ['linear'], ['zoom'], 13, 1.5, 15, 3, 17, 5],
          'circle-color': ['match', ['get', 'type'],
            'trotro_stop', '#FFAD3A',
            'lorry_park', '#f59e0b',
            'taxi_rank', '#a78bfa',
            'train_station', '#22d3ee',
            '#60a5fa' // bus_stop default
          ],
          'circle-opacity': ['interpolate', ['linear'], ['zoom'], 13, 0.2, 15, 0.45, 17, 0.65],
          'circle-stroke-width': 0,
        },
      });

      map.addLayer({
        id: 'transport-stops-labels', type: 'symbol', source: 'transport-stops', minzoom: 15,
        filter: ['!=', ['get', 'name'], ''],
        layout: {
          'text-field': ['get', 'name'],
          'text-size': ['interpolate', ['linear'], ['zoom'], 15, 8, 17, 10],
          'text-font': ['DIN Pro Medium', 'Arial Unicode MS Regular'],
          'text-offset': [0, 0.8], 'text-anchor': 'top',
          'text-allow-overlap': false, 'text-optional': true,
        },
        paint: {
          'text-color': ['match', ['get', 'type'],
            'trotro_stop', 'rgba(255,173,58,0.7)',
            'lorry_park', 'rgba(245,158,11,0.7)',
            'taxi_rank', 'rgba(167,139,250,0.7)',
            'train_station', 'rgba(34,211,238,0.7)',
            'rgba(96,165,250,0.5)'
          ],
          'text-halo-color': 'rgba(0,0,0,0.8)', 'text-halo-width': 1.5,
        },
      });

      // ── Station dots (major stations from Troski DB) ──
      map.addSource('stations', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });

      map.addLayer({
        id: 'station-glow', type: 'circle', source: 'stations', minzoom: 11,
        paint: {
          'circle-radius': ['interpolate', ['linear'], ['zoom'], 11, 8, 14, 14, 17, 20],
          'circle-color': '#60a5fa', 'circle-opacity': ['interpolate', ['linear'], ['zoom'], 11, 0.03, 14, 0.06],
        },
      });
      map.addLayer({
        id: 'station-dots', type: 'circle', source: 'stations', minzoom: 11,
        paint: {
          'circle-radius': ['interpolate', ['linear'], ['zoom'], 11, 2.5, 14, 5, 17, 7],
          'circle-color': '#60a5fa',
          'circle-opacity': ['interpolate', ['linear'], ['zoom'], 11, 0.25, 14, 0.5, 17, 0.7],
          'circle-stroke-width': ['interpolate', ['linear'], ['zoom'], 11, 0.5, 14, 1],
          'circle-stroke-color': 'rgba(96,165,250,0.25)',
        },
      });
      map.addLayer({
        id: 'station-labels', type: 'symbol', source: 'stations', minzoom: 13,
        layout: {
          'text-field': ['get', 'name'],
          'text-size': ['interpolate', ['linear'], ['zoom'], 13, 9, 16, 12],
          'text-font': ['DIN Pro Medium', 'Arial Unicode MS Regular'],
          'text-offset': [0, 1.2], 'text-anchor': 'top', 'text-allow-overlap': false,
        },
        paint: { 'text-color': 'rgba(147,187,253,0.8)', 'text-halo-color': 'rgba(0,0,0,0.85)', 'text-halo-width': 2 },
      });

      // ── Vehicle source ──
      map.addSource('vehicles', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });

      // Pulse ring
      map.addLayer({
        id: 'vehicle-pulse', type: 'circle', source: 'vehicles',
        paint: {
          'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 14, 14, 24, 17, 36],
          'circle-color': '#FFAD3A', 'circle-opacity': 0.08,
        },
      });
      // Glow
      map.addLayer({
        id: 'vehicle-glow', type: 'circle', source: 'vehicles',
        paint: {
          'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 8, 14, 14, 17, 22],
          'circle-color': '#FFAD3A', 'circle-opacity': 0.18,
        },
      });
      // Main dot
      map.addLayer({
        id: 'vehicle-dot', type: 'circle', source: 'vehicles',
        paint: {
          'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 5, 14, 9, 17, 13],
          'circle-color': '#FFAD3A',
          'circle-stroke-width': ['interpolate', ['linear'], ['zoom'], 10, 2, 14, 3],
          'circle-stroke-color': '#ffffff',
        },
      });

      // ── Direction arrow ──
      try {
        const ac = document.createElement('canvas');
        ac.width = 48; ac.height = 48;
        const ax = ac.getContext('2d');
        ax.fillStyle = '#FFAD3A';
        ax.beginPath();
        ax.moveTo(24, 4); ax.lineTo(38, 34); ax.lineTo(24, 26); ax.lineTo(10, 34);
        ax.closePath(); ax.fill();
        ax.fillStyle = '#1c1917';
        ax.beginPath();
        ax.moveTo(24, 10); ax.lineTo(33, 30); ax.lineTo(24, 24); ax.lineTo(15, 30);
        ax.closePath(); ax.fill();
        map.addImage('arrow-icon', ac);
        map.addLayer({
          id: 'vehicle-arrows', type: 'symbol', source: 'vehicles', minzoom: 12,
          layout: {
            'icon-image': 'arrow-icon',
            'icon-size': ['interpolate', ['linear'], ['zoom'], 12, 0.45, 14, 0.6, 17, 0.8],
            'icon-rotate': ['get', 'heading'], 'icon-rotation-alignment': 'map',
            'icon-allow-overlap': true, 'icon-ignore-placement': true,
          },
          paint: { 'icon-opacity': ['interpolate', ['linear'], ['zoom'], 12, 0.4, 14, 0.75] },
        });
      } catch(e) { console.log('Arrow error:', e); }

      // Plate labels
      map.addLayer({
        id: 'vehicle-labels', type: 'symbol', source: 'vehicles', minzoom: 13,
        layout: {
          'text-field': ['get', 'plateNumber'],
          'text-size': ['interpolate', ['linear'], ['zoom'], 13, 10, 17, 13],
          'text-font': ['DIN Pro Bold', 'Arial Unicode MS Bold'],
          'text-offset': [0, 2.0], 'text-anchor': 'top', 'text-allow-overlap': false,
        },
        paint: { 'text-color': '#ffffff', 'text-halo-color': 'rgba(0,0,0,0.85)', 'text-halo-width': 2.5 },
      });

      // ETA labels (floating above)
      map.addLayer({
        id: 'vehicle-eta', type: 'symbol', source: 'vehicles',
        filter: ['!=', ['get', 'etaLabel'], ''],
        layout: {
          'text-field': ['concat', '⏱ ', ['get', 'etaLabel']],
          'text-size': ['interpolate', ['linear'], ['zoom'], 10, 8, 14, 11],
          'text-font': ['DIN Pro Bold', 'Arial Unicode MS Bold'],
          'text-offset': [0, -2.0], 'text-anchor': 'bottom',
          'text-allow-overlap': true, 'text-ignore-placement': true,
        },
        paint: { 'text-color': '#FFAD3A', 'text-halo-color': 'rgba(12,10,9,0.9)', 'text-halo-width': 2.5 },
      });

      // ── Route line ──
      map.addSource('route-line', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
      map.addLayer({
        id: 'route-line-glow', type: 'line', source: 'route-line',
        paint: { 'line-color': '#FFAD3A', 'line-width': 12, 'line-opacity': 0, 'line-blur': 6 },
        layout: { 'line-cap': 'round', 'line-join': 'round' },
      });
      map.addLayer({
        id: 'route-line-main', type: 'line', source: 'route-line',
        paint: { 'line-color': '#FFAD3A', 'line-width': 4, 'line-opacity': 0 },
        layout: { 'line-cap': 'round', 'line-join': 'round' },
      });

      // Destination marker
      map.addSource('dest-marker', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
      map.addLayer({
        id: 'dest-glow', type: 'circle', source: 'dest-marker',
        paint: { 'circle-radius': 16, 'circle-color': '#22c55e', 'circle-opacity': 0.12 },
      });
      map.addLayer({
        id: 'dest-dot', type: 'circle', source: 'dest-marker',
        paint: { 'circle-radius': 7, 'circle-color': '#22c55e', 'circle-stroke-width': 3, 'circle-stroke-color': '#fff' },
      });
      map.addLayer({
        id: 'dest-label', type: 'symbol', source: 'dest-marker',
        layout: {
          'text-field': ['get', 'name'], 'text-size': 12,
          'text-font': ['DIN Pro Bold', 'Arial Unicode MS Bold'],
          'text-offset': [0, 1.6], 'text-anchor': 'top',
        },
        paint: { 'text-color': '#22c55e', 'text-halo-color': 'rgba(0,0,0,0.85)', 'text-halo-width': 2 },
      });

      // ── Vehicle click → route line + popup ──
      map.on('click', 'vehicle-dot', async (e) => {
        const f = e.features[0];
        const coords = f.geometry.coordinates.slice();
        const p = f.properties;
        const speedKmh = p.speed ? (p.speed * 3.6).toFixed(0) : '0';
        const ago = p.updatedAt ? timeAgo(p.updatedAt) : '--';
        const dest = ROUTE_DESTINATIONS[p.routeLabel];
        const driverName = driverMap[p.vanId] || 'Driver';
        const driverInitials = driverName.split(' ').map(n => n[0]).join('');

        let eta = '--', distKm = '--';
        if (dest) {
          try {
            const url = `https://api.mapbox.com/directions/v5/mapbox/driving/${coords[0]},${coords[1]};${dest.lng},${dest.lat}?geometries=geojson&overview=full&access_token=${mapboxgl.accessToken}`;
            const res = await fetch(url);
            const data = await res.json();
            if (data.routes?.[0]) {
              const route = data.routes[0];
              eta = Math.round(route.duration / 60) + ' min';
              distKm = (route.distance / 1000).toFixed(1) + ' km';
              map.getSource('route-line').setData({ type: 'Feature', geometry: route.geometry });
              map.getSource('dest-marker').setData({
                type: 'FeatureCollection',
                features: [{ type: 'Feature', geometry: { type: 'Point', coordinates: [dest.lng, dest.lat] }, properties: { name: dest.name } }],
              });
              animateRouteLine();
              const bounds = route.geometry.coordinates.reduce((b, c) => b.extend(c), new mapboxgl.LngLatBounds(route.geometry.coordinates[0], route.geometry.coordinates[0]));
              map.fitBounds(bounds, { padding: { top: 100, bottom: 140, left: 60, right: 60 }, duration: 800 });
            }
          } catch(err) { console.log('Dir err:', err); }
        } else {
          map.easeTo({ center: coords, zoom: Math.max(map.getZoom(), 14), duration: 600 });
        }

        new mapboxgl.Popup({ offset: 22, closeButton: true })
          .setLngLat(coords)
          .setHTML(`
            <div class="popup-header">
              <div class="popup-avatar">${driverInitials}</div>
              <div>
                <div class="popup-name">${driverName}</div>
                <div class="popup-route">${p.plateNumber} · ${p.routeLabel || 'En route'}</div>
              </div>
            </div>
            <div class="popup-stats">
              <div class="popup-stat">
                <div class="popup-stat-label">Speed</div>
                <div class="popup-stat-value">${speedKmh}<span style="font-size:10px;color:#57534e"> km/h</span></div>
              </div>
              <div class="popup-stat">
                <div class="popup-stat-label">ETA</div>
                <div class="popup-stat-value amber">${eta}</div>
              </div>
              <div class="popup-stat">
                <div class="popup-stat-label">Dist</div>
                <div class="popup-stat-value">${distKm}</div>
              </div>
            </div>
            <div class="popup-actions">
              <div class="popup-cta">🎫 Buy Ticket · GH₵ 8</div>
              <div class="popup-track">📍 Track</div>
            </div>
          `)
          .on('close', () => {
            map.getSource('route-line').setData({ type: 'FeatureCollection', features: [] });
            map.getSource('dest-marker').setData({ type: 'FeatureCollection', features: [] });
          })
          .addTo(map);
      });

      // ── Station click ──
      map.on('click', 'station-dots', (e) => {
        const f = e.features[0];
        const coords = f.geometry.coordinates.slice();
        const name = f.properties.name;

        map.easeTo({ center: coords, zoom: Math.max(map.getZoom(), 14), duration: 500 });

        new mapboxgl.Popup({ offset: 14, closeButton: true, className: 'station-popup' })
          .setLngLat(coords)
          .setHTML(`
            <div class="popup-header">
              <div class="station-avatar">🚏</div>
              <div>
                <div class="station-name">${name}</div>
                <div class="station-type">Trotro Station</div>
              </div>
            </div>
            <div class="popup-stats">
              <div class="popup-stat">
                <div class="popup-stat-label">Status</div>
                <div class="popup-stat-value green">Active</div>
              </div>
              <div class="popup-stat">
                <div class="popup-stat-label">Nearby</div>
                <div class="popup-stat-value">--</div>
              </div>
            </div>
          `)
          .addTo(map);
      });

      // Clear route on empty click
      map.on('click', (e) => {
        const vehicleHit = map.queryRenderedFeatures(e.point, { layers: ['vehicle-dot'] });
        const stationHit = map.queryRenderedFeatures(e.point, { layers: ['station-dots'] });
        if (!vehicleHit.length && !stationHit.length) {
          map.getSource('route-line')?.setData({ type: 'FeatureCollection', features: [] });
          map.getSource('dest-marker')?.setData({ type: 'FeatureCollection', features: [] });
        }
      });

      map.on('mouseenter', 'vehicle-dot', () => { map.getCanvas().style.cursor = 'pointer'; });
      map.on('mouseleave', 'vehicle-dot', () => { map.getCanvas().style.cursor = ''; });
      map.on('mouseenter', 'station-dots', () => { map.getCanvas().style.cursor = 'pointer'; });
      map.on('mouseleave', 'station-dots', () => { map.getCanvas().style.cursor = ''; });

      // ── Load data + start animations ──
      fetchDrivers();
      fetchPositions();
      fetchStations();
      fetchTransportStops();
      startPulseAnimation();
      setInterval(fetchPositions, 30000);
    });

    // ── Locate me ──
    function locateMe() {
      navigator.geolocation.getCurrentPosition((pos) => {
        const { latitude: lat, longitude: lng } = pos.coords;
        map.flyTo({ center: [lng, lat], zoom: 15, duration: 1500 });

        // Add/update user marker
        if (userMarker) userMarker.remove();
        const el = document.createElement('div');
        el.innerHTML = `
          <div style="width:20px;height:20px;border-radius:50%;background:#3b82f6;border:3px solid #fff;box-shadow:0 0 12px rgba(59,130,246,0.5);position:relative;">
            <div style="position:absolute;inset:-8px;border-radius:50%;border:2px solid rgba(59,130,246,0.3);animation:pulse-dot 2s infinite;"></div>
          </div>`;
        userMarker = new mapboxgl.Marker({ element: el }).setLngLat([lng, lat]).addTo(map);
      }, () => { alert('Location unavailable'); });
    }

    // ── Fetch drivers ──
    async function fetchDrivers() {
      const { data } = await sb.from('fleet_drivers').select('name, assigned_van_id').not('assigned_van_id', 'is', null);
      if (data) data.forEach(d => { driverMap[d.assigned_van_id] = d.name; });
    }

    // ── ETA estimate (haversine, 20km/h avg) ──
    function estimateETA(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
      const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return { distKm: dist.toFixed(1), etaMins: Math.round((dist/20)*60) };
    }

    // ── Fetch vehicle positions ──
    async function fetchPositions() {
      const { data, error } = await sb.from('vehicle_positions')
        .select('van_id, plate_number, route_id, route_label, latitude, longitude, heading, speed, updated_at')
        .eq('is_active', true);
      if (error || !data) { document.getElementById('status').textContent = '⚠ Error'; return; }

      const geojson = {
        type: 'FeatureCollection',
        features: data.map(v => {
          const dest = ROUTE_DESTINATIONS[v.route_label];
          const eta = dest ? estimateETA(v.latitude, v.longitude, dest.lat, dest.lng) : null;
          return {
            type: 'Feature',
            geometry: { type: 'Point', coordinates: [v.longitude, v.latitude] },
            properties: {
              vanId: v.van_id, plateNumber: v.plate_number, routeLabel: v.route_label || '',
              heading: v.heading || 0, speed: v.speed || 0, updatedAt: v.updated_at,
              etaLabel: eta ? `${eta.etaMins} min` : '',
            },
          };
        }),
      };

      map.getSource('vehicles')?.setData(geojson);
      document.getElementById('count').textContent = data.length;
      document.getElementById('status').textContent = `↻ ${new Date().toLocaleTimeString()} · ${data.length} vehicle${data.length!==1?'s':''}`;
      updatePills(data);
    }

    // ── Fetch stations ──
    async function fetchStations() {
      const { data } = await sb.from('stations').select('name, latitude, longitude').not('latitude', 'is', null);
      if (!data) return;
      map.getSource('stations')?.setData({
        type: 'FeatureCollection',
        features: data.filter(s => s.latitude && s.longitude).map(s => ({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [s.longitude, s.latitude] },
          properties: { name: s.name },
        })),
      });
    }

    // ── Fetch transport stops (local GeoJSON file) ──
    async function fetchTransportStops() {
      try {
        const res = await fetch('/transport-stops-geojson.json');
        const data = await res.json();
        map.getSource('transport-stops')?.setData(data);
        console.log('Loaded', data.features.length, 'transport stops');
      } catch(e) { console.log('Transport stops error:', e); }
    }

    // ── Pills ──
    function updatePills(vehicles) {
      const routes = [...new Set(vehicles.map(v => v.route_label).filter(Boolean))];
      const moving = vehicles.filter(v => v.speed > 2).length;
      document.getElementById('pills').innerHTML = `
        <div class="float-pill"><div class="pill-dot" style="background:#22c55e"></div>${moving} moving</div>
        <div class="float-pill"><div class="pill-dot" style="background:#FFAD3A"></div>${vehicles.length - moving} at station</div>
        <div class="float-pill"><div class="pill-dot" style="background:#60a5fa"></div>${routes.length} routes</div>
      `;
    }

    // ── Route line fade-in animation ──
    function animateRouteLine() {
      map.setPaintProperty('route-line-main', 'line-opacity', 0);
      map.setPaintProperty('route-line-glow', 'line-opacity', 0);
      const start = performance.now();
      function step(now) {
        const p = Math.min((now - start) / 800, 1);
        const e = 1 - Math.pow(1 - p, 3);
        map.setPaintProperty('route-line-main', 'line-opacity', e * 0.85);
        map.setPaintProperty('route-line-glow', 'line-opacity', e * 0.12);
        if (p < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    // ── Pulse animation ──
    function startPulseAnimation() {
      let phase = 0;
      function tick() {
        phase += 0.025;
        const s = Math.sin(phase);
        try {
          map.setPaintProperty('vehicle-pulse', 'circle-radius', [
            'interpolate', ['linear'], ['zoom'],
            10, 14*(1+0.25*s), 14, 24*(1+0.25*s), 17, 36*(1+0.25*s)
          ]);
          map.setPaintProperty('vehicle-pulse', 'circle-opacity', 0.06 + 0.05*s);
        } catch(e) {}
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    function timeAgo(d) {
      const s = (Date.now() - new Date(d).getTime()) / 1000;
      if (s < 60) return Math.floor(s) + 's';
      if (s < 3600) return Math.floor(s/60) + 'm';
      return Math.floor(s/3600) + 'h';
    }
  </script>
</body>
