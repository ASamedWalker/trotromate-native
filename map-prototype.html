<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Troski — Live Transit Map</title>
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', system-ui, sans-serif; background: #0c0a09; color: #fafaf9; overflow: hidden; }
    #map { width: 100vw; height: 100vh; }

    /* ── Top bar (simulated phone status) ── */
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20;
      padding: 12px 16px 8px;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(12,10,9,0.7) 0%, transparent 100%);
      pointer-events: none;
    }
    .top-bar > * { pointer-events: auto; }

    /* ── Search bar ── */
    .search-bar {
      flex: 1; max-width: 480px; margin: 0 auto;
      background: rgba(28,25,23,0.9); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,173,58,0.12); border-radius: 14px;
      padding: 12px 16px; display: flex; align-items: center; gap: 10px;
      cursor: pointer; transition: border-color 0.2s;
    }
    .search-bar:hover { border-color: rgba(255,173,58,0.3); }
    .search-icon { color: #FFAD3A; font-size: 16px; }
    .search-placeholder { color: #78716c; font-size: 14px; font-weight: 500; }

    /* ── Live badge ── */
    .live-badge {
      position: fixed; top: 70px; left: 16px; z-index: 10;
      background: rgba(12,10,9,0.88); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,173,58,0.15); border-radius: 12px;
      padding: 8px 14px; display: flex; align-items: center; gap: 8px;
      transition: transform 0.2s;
    }
    .live-badge:hover { transform: scale(1.02); }
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #22c55e;
      animation: pulse 2s ease-in-out infinite;
      box-shadow: 0 0 6px rgba(34,197,94,0.5);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.4); }
    }
    .live-badge span { font-size: 12px; font-weight: 600; }
    .live-count { color: #FFAD3A; font-weight: 800; }

    /* ── Bottom action bar ── */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
      background: rgba(12,10,9,0.92); backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 12px 16px 24px;
      display: flex; align-items: center; gap: 12px;
    }
    .wallet-card {
      flex: 1; background: rgba(28,25,23,0.95);
      border: 1px solid rgba(255,173,58,0.12); border-radius: 14px;
      padding: 12px 16px; display: flex; align-items: center; gap: 12px;
      cursor: pointer; transition: border-color 0.2s;
    }
    .wallet-card:hover { border-color: rgba(255,173,58,0.3); }
    .wallet-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: rgba(34,197,94,0.12); display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .wallet-info { flex: 1; }
    .wallet-label { font-size: 11px; color: #78716c; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .wallet-balance { font-size: 20px; font-weight: 800; color: #fafaf9; margin-top: 1px; }
    .wallet-balance span { color: #a8a29e; font-size: 14px; font-weight: 500; }
    .scan-btn {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, #FF716A, #FFAD3A);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: transform 0.15s; box-shadow: 0 4px 16px rgba(255,173,58,0.3);
      font-size: 22px; border: none;
    }
    .scan-btn:hover { transform: scale(1.05); }
    .scan-btn:active { transform: scale(0.95); }

    /* ── Vehicle popup ── */
    .mapboxgl-popup { max-width: none !important; }
    .mapboxgl-popup-content {
      background: rgba(28,25,23,0.95) !important; color: #fafaf9 !important;
      border-radius: 16px !important; padding: 0 !important;
      border: 1px solid rgba(255,173,58,0.12) !important;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5) !important;
      backdrop-filter: blur(16px) !important; min-width: 240px;
      overflow: hidden;
    }
    .mapboxgl-popup-close-button { color: #78716c !important; font-size: 18px !important; padding: 8px 12px !important; }
    .mapboxgl-popup-tip { border-top-color: rgba(28,25,23,0.95) !important; }
    .popup-header {
      padding: 16px 16px 12px; display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .popup-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: rgba(255,173,58,0.12); display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .popup-plate { font-size: 18px; font-weight: 800; color: #FFAD3A; letter-spacing: -0.5px; }
    .popup-route { font-size: 12px; color: #a8a29e; margin-top: 2px; font-weight: 500; }
    .popup-stats {
      padding: 12px 16px; display: flex; gap: 20px;
    }
    .popup-stat { }
    .popup-stat-label { font-size: 10px; color: #57534e; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
    .popup-stat-value { font-size: 16px; font-weight: 800; color: #fafaf9; margin-top: 2px; }
    .popup-stat-value.amber { color: #FFAD3A; }
    .popup-cta {
      margin: 0 12px 12px; padding: 10px; border-radius: 12px; text-align: center;
      background: linear-gradient(135deg, #FF716A, #FFAD3A);
      color: #1c1917; font-weight: 700; font-size: 13px; cursor: pointer;
      transition: transform 0.15s;
    }
    .popup-cta:hover { transform: scale(1.02); }

    /* ── Floating pills (left side) ── */
    .float-pills {
      position: fixed; top: 70px; right: 16px; z-index: 10;
      display: flex; flex-direction: column; gap: 8px;
    }
    .float-pill {
      background: rgba(12,10,9,0.85); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.06); border-radius: 10px;
      padding: 6px 12px; font-size: 11px; font-weight: 600; color: #a8a29e;
      display: flex; align-items: center; gap: 6px;
    }
    .pill-dot { width: 6px; height: 6px; border-radius: 3px; }

    /* ── Refresh indicator ── */
    .refresh-indicator {
      position: fixed; bottom: 100px; right: 16px; z-index: 10;
      background: rgba(28,25,23,0.9); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.06); border-radius: 10px;
      padding: 8px 12px; font-size: 11px; color: #57534e; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
    }
    .refresh-indicator:hover { color: #FFAD3A; border-color: rgba(255,173,58,0.2); }
  </style>
</head>
<body>
  <!-- Top bar with search -->
  <div class="top-bar">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <span class="search-placeholder">Where are you going?</span>
    </div>
  </div>

  <!-- Live count badge -->
  <div class="live-badge">
    <div class="live-dot"></div>
    <span><span class="live-count" id="count">0</span> trotros live</span>
  </div>

  <!-- Context pills -->
  <div class="float-pills" id="pills"></div>

  <!-- Map -->
  <div id="map"></div>

  <!-- Bottom action bar -->
  <div class="bottom-bar">
    <div class="wallet-card">
      <div class="wallet-icon">💳</div>
      <div class="wallet-info">
        <div class="wallet-label">Wallet</div>
        <div class="wallet-balance">GH₵ 45<span>.00</span></div>
      </div>
    </div>
    <button class="scan-btn" title="Scan QR to Pay">📷</button>
  </div>

  <!-- Refresh -->
  <div class="refresh-indicator" id="status" onclick="fetchPositions()">Loading...</div>

  <script>
    // ── Config ──
    mapboxgl.accessToken = 'pk.eyJ1Ijoic2FtcHkxIiwiYSI6ImNranl2NHNjdTAxZzQzMWxldmx5dGhkaDEifQ.1eOzL1554nbXGIPai5Kmlg';
    const SUPABASE_URL = 'https://rqctajmbfrqtjuwkykrg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJxY3Rham1iZnJxdGp1d2t5a3JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1Mzk5ODcsImV4cCI6MjA4NTExNTk4N30.jaPQiSS9ltsupXB2yMEnEkKyCxjOJUC5AP1KPl7kY68';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Previous positions for interpolation
    let prevPositions = {};

    // Route destinations lookup (route_label → destination coords)
    const ROUTE_DESTINATIONS = {
      'Circle → Madina': { lat: 5.6697, lng: -0.1662, name: 'Madina' },
      'Kasoa → Kaneshie': { lat: 5.5508, lng: -0.2377, name: 'Kaneshie' },
      'Madina → Accra': { lat: 5.5502, lng: -0.2174, name: 'Accra Central' },
      'Achimota → Circle': { lat: 5.5702, lng: -0.2167, name: 'Circle' },
      'Tema → Accra': { lat: 5.5502, lng: -0.2174, name: 'Accra Central' },
      'Lapaz → Circle': { lat: 5.5702, lng: -0.2167, name: 'Circle' },
      'Nima → Circle': { lat: 5.5702, lng: -0.2167, name: 'Circle' },
      'Adenta → Madina': { lat: 5.6697, lng: -0.1662, name: 'Madina' },
      'Dansoman → Kaneshie': { lat: 5.5508, lng: -0.2377, name: 'Kaneshie' },
      'Osu → Circle': { lat: 5.5702, lng: -0.2167, name: 'Circle' },
    };

    // ── Map ──
    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/dark-v11',
      center: [-0.2050, 5.5750], // Greater Accra center
      zoom: 12,
      pitch: 0,
      bearing: 0,
      antialias: true,
      attributionControl: false,
    });

    map.addControl(new mapboxgl.AttributionControl({ compact: true }), 'bottom-left');

    // ── Cinematic intro ──
    setTimeout(() => {
      map.easeTo({ pitch: 45, bearing: -15, zoom: 12.5, duration: 3000 });
    }, 800);

    map.on('load', () => {
      // ── 3D Buildings ──
      const layers = map.getStyle().layers;
      const labelLayerId = layers.find(l => l.type === 'symbol' && l.layout && l.layout['text-field'])?.id;

      map.addLayer({
        id: '3d-buildings',
        source: 'composite',
        'source-layer': 'building',
        filter: ['==', 'extrude', 'true'],
        type: 'fill-extrusion',
        minzoom: 14,
        paint: {
          'fill-extrusion-color': [
            'interpolate', ['linear'], ['get', 'height'],
            0, '#1c1917',
            50, '#292524',
            100, '#44403c'
          ],
          'fill-extrusion-height': ['interpolate', ['linear'], ['zoom'], 14, 0, 14.05, ['get', 'height']],
          'fill-extrusion-base': ['interpolate', ['linear'], ['zoom'], 14, 0, 14.05, ['get', 'min_height']],
          'fill-extrusion-opacity': 0.65,
          'fill-extrusion-vertical-gradient': true,
        },
      }, labelLayerId);

      // ── Station dots (secondary — subtle) ──
      map.addSource('stations', {
        type: 'geojson',
        data: { type: 'FeatureCollection', features: [] },
      });

      map.addLayer({
        id: 'station-glow',
        type: 'circle',
        source: 'stations',
        minzoom: 11,
        paint: {
          'circle-radius': ['interpolate', ['linear'], ['zoom'], 11, 6, 14, 12, 17, 18],
          'circle-color': '#60a5fa',
          'circle-opacity': ['interpolate', ['linear'], ['zoom'], 11, 0.04, 14, 0.08],
        },
      });

      map.addLayer({
        id: 'station-dots',
        type: 'circle',
        source: 'stations',
        minzoom: 11,
        paint: {
          'circle-radius': ['interpolate', ['linear'], ['zoom'], 11, 2, 14, 4, 17, 6],
          'circle-color': '#60a5fa',
          'circle-opacity': ['interpolate', ['linear'], ['zoom'], 11, 0.3, 14, 0.6],
          'circle-stroke-width': 1,
          'circle-stroke-color': 'rgba(96,165,250,0.3)',
        },
      });

      map.addLayer({
        id: 'station-labels',
        type: 'symbol',
        source: 'stations',
        minzoom: 13,
        layout: {
          'text-field': ['get', 'name'],
          'text-size': ['interpolate', ['linear'], ['zoom'], 13, 9, 16, 11],
          'text-font': ['DIN Pro Medium', 'Arial Unicode MS Regular'],
          'text-offset': [0, 1.2],
          'text-anchor': 'top',
          'text-allow-overlap': false,
        },
        paint: {
          'text-color': 'rgba(147,187,253,0.85)',
          'text-halo-color': 'rgba(0,0,0,0.8)',
          'text-halo-width': 2,
        },
      });

      // ── Vehicle source ──
      map.addSource('vehicles', {
        type: 'geojson',
        data: { type: 'FeatureCollection', features: [] },
      });

      // Vehicle pulse ring (ANIMATED — breathes in/out)
      map.addLayer({
        id: 'vehicle-pulse',
        type: 'circle',
        source: 'vehicles',
        paint: {
          'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 14, 14, 24, 17, 36],
          'circle-color': '#FFAD3A',
          'circle-opacity': 0.08,
          'circle-radius-transition': { duration: 1500, delay: 0 },
          'circle-opacity-transition': { duration: 1500, delay: 0 },
        },
      });

      // Vehicle glow
      map.addLayer({
        id: 'vehicle-glow',
        type: 'circle',
        source: 'vehicles',
        paint: {
          'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 8, 14, 14, 17, 22],
          'circle-color': '#FFAD3A',
          'circle-opacity': 0.15,
        },
      });

      // Vehicle main dot
      map.addLayer({
        id: 'vehicle-dot',
        type: 'circle',
        source: 'vehicles',
        paint: {
          'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 5, 14, 8, 17, 12],
          'circle-color': '#FFAD3A',
          'circle-stroke-width': ['interpolate', ['linear'], ['zoom'], 10, 2, 14, 3, 17, 3.5],
          'circle-stroke-color': '#ffffff',
        },
      });

      // ── Direction arrow (shows heading at zoom 12+) ──
      try {
        const arrowCanvas = document.createElement('canvas');
        arrowCanvas.width = 40;
        arrowCanvas.height = 40;
        const actx = arrowCanvas.getContext('2d');
        actx.fillStyle = '#FFAD3A';
        actx.beginPath();
        actx.moveTo(20, 4);
        actx.lineTo(32, 30);
        actx.lineTo(20, 24);
        actx.lineTo(8, 30);
        actx.closePath();
        actx.fill();

        map.addImage('arrow-icon', arrowCanvas);

        map.addLayer({
          id: 'vehicle-arrows',
          type: 'symbol',
          source: 'vehicles',
          minzoom: 12,
          layout: {
            'icon-image': 'arrow-icon',
            'icon-size': ['interpolate', ['linear'], ['zoom'], 12, 0.5, 14, 0.7, 17, 0.9],
            'icon-rotate': ['get', 'heading'],
            'icon-rotation-alignment': 'map',
            'icon-allow-overlap': true,
            'icon-ignore-placement': true,
          },
          paint: {
            'icon-opacity': ['interpolate', ['linear'], ['zoom'], 12, 0.5, 14, 0.8],
          },
        });
      } catch(e) { console.log('Arrow layer error:', e); }

      // Plate labels
      map.addLayer({
        id: 'vehicle-labels',
        type: 'symbol',
        source: 'vehicles',
        minzoom: 13,
        layout: {
          'text-field': ['get', 'plateNumber'],
          'text-size': ['interpolate', ['linear'], ['zoom'], 13, 10, 17, 12],
          'text-font': ['DIN Pro Bold', 'Arial Unicode MS Bold'],
          'text-offset': [0, 2.0],
          'text-anchor': 'top',
          'text-allow-overlap': false,
        },
        paint: {
          'text-color': '#ffffff',
          'text-halo-color': 'rgba(0,0,0,0.8)',
          'text-halo-width': 2.5,
        },
      });

      // Route labels
      map.addLayer({
        id: 'vehicle-route-labels',
        type: 'symbol',
        source: 'vehicles',
        minzoom: 14,
        layout: {
          'text-field': ['get', 'routeLabel'],
          'text-size': 10,
          'text-font': ['DIN Pro Medium', 'Arial Unicode MS Regular'],
          'text-offset': [0, 3.2],
          'text-anchor': 'top',
          'text-allow-overlap': false,
        },
        paint: {
          'text-color': '#d6d3d1',
          'text-halo-color': 'rgba(0,0,0,0.8)',
          'text-halo-width': 2,
        },
      });

      // ── Floating ETA labels (visible at all zoom levels) ──
      map.addLayer({
        id: 'vehicle-eta-labels',
        type: 'symbol',
        source: 'vehicles',
        filter: ['!=', ['get', 'etaLabel'], ''],
        layout: {
          'text-field': ['get', 'etaLabel'],
          'text-size': ['interpolate', ['linear'], ['zoom'], 10, 9, 14, 11, 17, 13],
          'text-font': ['DIN Pro Bold', 'Arial Unicode MS Bold'],
          'text-offset': [0, -2.0],
          'text-anchor': 'bottom',
          'text-allow-overlap': true,
          'text-ignore-placement': true,
        },
        paint: {
          'text-color': '#FFAD3A',
          'text-halo-color': 'rgba(12,10,9,0.9)',
          'text-halo-width': 2.5,
        },
      });

      // ── Route line source (drawn on vehicle tap) ──
      map.addSource('route-line', {
        type: 'geojson',
        data: { type: 'FeatureCollection', features: [] },
      });

      // Route line glow (behind)
      map.addLayer({
        id: 'route-line-glow',
        type: 'line',
        source: 'route-line',
        paint: {
          'line-color': '#FFAD3A',
          'line-width': 10,
          'line-opacity': 0.15,
          'line-blur': 4,
        },
        layout: { 'line-cap': 'round', 'line-join': 'round' },
      });

      // Route line main
      map.addLayer({
        id: 'route-line-main',
        type: 'line',
        source: 'route-line',
        paint: {
          'line-color': '#FFAD3A',
          'line-width': 4,
          'line-opacity': 0.85,
        },
        layout: { 'line-cap': 'round', 'line-join': 'round' },
      });

      // Destination marker
      map.addSource('destination-marker', {
        type: 'geojson',
        data: { type: 'FeatureCollection', features: [] },
      });

      map.addLayer({
        id: 'destination-dot',
        type: 'circle',
        source: 'destination-marker',
        paint: {
          'circle-radius': 8,
          'circle-color': '#22c55e',
          'circle-stroke-width': 3,
          'circle-stroke-color': '#ffffff',
        },
      });

      map.addLayer({
        id: 'destination-label',
        type: 'symbol',
        source: 'destination-marker',
        layout: {
          'text-field': ['get', 'name'],
          'text-size': 12,
          'text-font': ['DIN Pro Bold', 'Arial Unicode MS Bold'],
          'text-offset': [0, 1.5],
          'text-anchor': 'top',
        },
        paint: {
          'text-color': '#22c55e',
          'text-halo-color': 'rgba(0,0,0,0.8)',
          'text-halo-width': 2,
        },
      });

      // ── Click handler — popup + route line ──
      map.on('click', 'vehicle-dot', async (e) => {
        const f = e.features[0];
        const coords = f.geometry.coordinates.slice();
        const p = f.properties;
        const speedKmh = p.speed ? (p.speed * 3.6).toFixed(0) : '0';
        const ago = p.updatedAt ? timeAgo(p.updatedAt) : '--';
        const dest = ROUTE_DESTINATIONS[p.routeLabel];

        // Fetch route line from Mapbox Directions API
        let eta = '--';
        let distKm = '--';
        if (dest) {
          try {
            const url = `https://api.mapbox.com/directions/v5/mapbox/driving/${coords[0]},${coords[1]};${dest.lng},${dest.lat}?geometries=geojson&overview=full&access_token=${mapboxgl.accessToken}`;
            const res = await fetch(url);
            const data = await res.json();

            if (data.routes && data.routes[0]) {
              const route = data.routes[0];
              eta = Math.round(route.duration / 60) + ' min';
              distKm = (route.distance / 1000).toFixed(1) + ' km';

              // Draw route line with progressive animation (snake effect)
              map.getSource('route-line').setData({
                type: 'Feature',
                geometry: route.geometry,
              });
              // Animate line drawing
              animateRouteLine();

              // Show destination marker
              map.getSource('destination-marker').setData({
                type: 'FeatureCollection',
                features: [{
                  type: 'Feature',
                  geometry: { type: 'Point', coordinates: [dest.lng, dest.lat] },
                  properties: { name: dest.name },
                }],
              });

              // Fit camera to show route
              const routeCoords = route.geometry.coordinates;
              const bounds = routeCoords.reduce((b, c) => b.extend(c), new mapboxgl.LngLatBounds(routeCoords[0], routeCoords[0]));
              map.fitBounds(bounds, { padding: { top: 100, bottom: 140, left: 60, right: 60 }, duration: 800 });
            }
          } catch (err) {
            console.log('Directions error:', err);
          }
        } else {
          map.easeTo({ center: coords, zoom: Math.max(map.getZoom(), 14), duration: 600 });
        }

        const driverName = driverMap[p.vanId] || 'Driver';
        const driverInitials = driverName.split(' ').map(n => n[0]).join('');

        new mapboxgl.Popup({ offset: 20, closeButton: true })
          .setLngLat(coords)
          .setHTML(`
            <div class="popup-header">
              <div style="width:40px;height:40px;border-radius:20px;background:#FFAD3A;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#1c1917;">${driverInitials}</div>
              <div>
                <div class="popup-plate">${driverName}</div>
                <div class="popup-route">${p.plateNumber} · ${p.routeLabel || 'En route'}</div>
              </div>
            </div>
            <div class="popup-stats">
              <div class="popup-stat">
                <div class="popup-stat-label">Speed</div>
                <div class="popup-stat-value">${speedKmh} <span style="font-size:11px;color:#78716c">km/h</span></div>
              </div>
              <div class="popup-stat">
                <div class="popup-stat-label">ETA</div>
                <div class="popup-stat-value amber">${eta}</div>
              </div>
              <div class="popup-stat">
                <div class="popup-stat-label">Distance</div>
                <div class="popup-stat-value">${distKm}</div>
              </div>
            </div>
            <div class="popup-cta" onclick="alert('Buy Ticket flow coming soon!')">🎫 Buy Ticket · GH₵ 8.00</div>
          `)
          .on('close', () => {
            // Clear route line when popup closes
            map.getSource('route-line').setData({ type: 'FeatureCollection', features: [] });
            map.getSource('destination-marker').setData({ type: 'FeatureCollection', features: [] });
          })
          .addTo(map);
      });

      // Clear route on map click (not on vehicle)
      map.on('click', (e) => {
        if (!map.queryRenderedFeatures(e.point, { layers: ['vehicle-dot'] }).length) {
          map.getSource('route-line')?.setData({ type: 'FeatureCollection', features: [] });
          map.getSource('destination-marker')?.setData({ type: 'FeatureCollection', features: [] });
        }
      });

      map.on('mouseenter', 'vehicle-dot', () => { map.getCanvas().style.cursor = 'pointer'; });
      map.on('mouseleave', 'vehicle-dot', () => { map.getCanvas().style.cursor = ''; });

      // ── Load data ──
      fetchPositions();
      fetchStations();

      // ── Start animations ──
      startPulseAnimation();

      // ── Auto refresh ──
      setInterval(fetchPositions, 30000);
    });

    // ── Driver names lookup (from fleet_drivers joined via vehicle_positions) ──
    let driverMap = {}; // van_id → driver name
    async function fetchDrivers() {
      const { data } = await sb
        .from('fleet_drivers')
        .select('name, assigned_van_id')
        .not('assigned_van_id', 'is', null);
      if (data) {
        data.forEach(d => { driverMap[d.assigned_van_id] = d.name; });
      }
    }
    fetchDrivers();

    // ── Estimate ETA from distance (simple: 20km/h avg trotro speed in Accra traffic) ──
    function estimateETA(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
      const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      const mins = Math.round((dist / 20) * 60); // 20 km/h avg
      return { distKm: dist.toFixed(1), etaMins: mins };
    }

    // ── Fetch vehicle positions ──
    async function fetchPositions() {
      const { data, error } = await sb
        .from('vehicle_positions')
        .select('van_id, plate_number, route_id, route_label, latitude, longitude, heading, speed, updated_at')
        .eq('is_active', true);

      if (error || !data) {
        document.getElementById('status').textContent = '⚠ Error fetching';
        return;
      }

      const geojson = {
        type: 'FeatureCollection',
        features: data.map(v => {
          const dest = ROUTE_DESTINATIONS[v.route_label];
          const eta = dest ? estimateETA(v.latitude, v.longitude, dest.lat, dest.lng) : null;
          const driverName = driverMap[v.van_id] || '';
          const initials = driverName ? driverName.split(' ').map(n => n[0]).join('') : '';

          return {
            type: 'Feature',
            geometry: { type: 'Point', coordinates: [v.longitude, v.latitude] },
            properties: {
              vanId: v.van_id,
              plateNumber: v.plate_number,
              routeLabel: v.route_label || '',
              heading: v.heading || 0,
              speed: v.speed || 0,
              updatedAt: v.updated_at,
              driverName,
              initials,
              etaLabel: eta ? `${eta.etaMins} min` : '',
              etaMins: eta ? eta.etaMins : 999,
            },
          };
        }),
      };

      const src = map.getSource('vehicles');
      if (src) src.setData(geojson);

      const count = data.length;
      document.getElementById('count').textContent = count;
      document.getElementById('status').textContent = `↻ ${new Date().toLocaleTimeString()} · ${count} vehicle${count !== 1 ? 's' : ''}`;

      updatePills(data);
    }

    // ── Fetch stations (secondary dots) ──
    async function fetchStations() {
      const { data } = await sb
        .from('stations')
        .select('name, latitude, longitude')
        .not('latitude', 'is', null);

      if (!data) return;

      const geojson = {
        type: 'FeatureCollection',
        features: data.filter(s => s.latitude && s.longitude).map(s => ({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [s.longitude, s.latitude] },
          properties: { name: s.name },
        })),
      };

      const src = map.getSource('stations');
      if (src) src.setData(geojson);
    }

    // ── Update context pills ──
    function updatePills(vehicles) {
      const routes = [...new Set(vehicles.map(v => v.route_label).filter(Boolean))];
      const moving = vehicles.filter(v => v.speed > 2).length;
      const stationary = vehicles.length - moving;

      document.getElementById('pills').innerHTML = `
        <div class="float-pill">
          <div class="pill-dot" style="background:#22c55e"></div>
          ${moving} moving
        </div>
        <div class="float-pill">
          <div class="pill-dot" style="background:#FFAD3A"></div>
          ${stationary} at station
        </div>
        <div class="float-pill">
          <div class="pill-dot" style="background:#60a5fa"></div>
          ${routes.length} routes active
        </div>
      `;
    }

    function timeAgo(dateStr) {
      const diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
      if (diff < 60) return Math.floor(diff) + 's ago';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      return Math.floor(diff / 3600) + 'h ago';
    }

    // ── Animated route line (progressive snake draw) ──
    function animateRouteLine() {
      // Simple approach: fade in instead of trim (trim not supported in all versions)
      map.setPaintProperty('route-line-main', 'line-opacity', 0);
      map.setPaintProperty('route-line-glow', 'line-opacity', 0);
      let progress = 0;
      const duration = 800;
      const start = performance.now();
      function step(now) {
        progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        map.setPaintProperty('route-line-main', 'line-opacity', eased * 0.85);
        map.setPaintProperty('route-line-glow', 'line-opacity', eased * 0.15);
        if (progress < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    // ── Pulsing vehicle dots animation ──
    function startPulseAnimation() {
      let phase = 0;
      function tick() {
        phase += 0.03;
        const s = Math.sin(phase);
        const scale = 1 + 0.25 * s;
        const opacity = 0.06 + 0.05 * s;
        try {
          map.setPaintProperty('vehicle-pulse', 'circle-radius', [
            'interpolate', ['linear'], ['zoom'],
            10, 14 * scale, 14, 24 * scale, 17, 36 * scale
          ]);
          map.setPaintProperty('vehicle-pulse', 'circle-opacity', opacity);
        } catch(e) {}
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }
  </script>
</body>
